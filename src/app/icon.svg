<svg width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Freeby" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fb-bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset=".5" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="fb-sheen" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff" stop-opacity=".28"/>
      <stop offset=".5" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#fb-bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#fb-sheen)"/>

  <!-- Bold white "f" monogram: vertical stem + top arm + mid arm. -->
  <path d="M212 128 L340 128 L340 180 L262 180 L262 234 L320 234 L320 286 L262 286 L262 402 L212 402 Z"
        fill="#ffffff"/>

  <!-- White "paid / done" badge at the foot with an indigo check inside.
       High contrast against the indigo field so it reads at every size. -->
  <circle cx="360" cy="352" r="70" fill="#ffffff"/>
  <path d="M330 354 l20 22 l44 -52" fill="none" stroke="#4f46e5"
        stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
